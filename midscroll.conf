# midscroll tuning — edit here or use the midscroll-settings GUI, then:
#   sudo systemctl restart midscroll
#
# Speed curve is Chromium/Edge's Windows autoscroll formula:
#   speed (px/sec) = SPEED_MULT * (pixels dragged) ^ SPEED_EXP   per axis
# Defaults match Chromium: dead zone 15, exponent 2.2, multiplier
# 0.000008 px/ms (= 0.008 px/s). Small drags crawl, full-screen drags fly.

DEADZONE_PX = 15          # per-axis dead zone in pixels
SPEED_MULT = 0.008        # overall speed knob (bigger = faster everywhere)
SPEED_EXP = 2.2           # curve shape (bigger = more extreme at long drags)
MAX_PX_PER_SEC = 30000    # safety cap
PX_PER_NOTCH = 55         # px one wheel notch scrolls in your apps; lower
                          #   this if everything feels too slow overall
MAX_DRAG_PX = 1200        # max effective drag distance (cursor is anchored
                          #   while scrolling, so this caps the top speed
                          #   your hand can dial in)
TICK_HZ = 90              # scroll smoothness (event rate)
NATURAL = false           # true = inverted / touchscreen-style direction

# Click the middle button once to start autoscroll and again (or any click)
# to stop, Windows-Explorer / Firefox style, instead of holding and
# dragging. In this mode the middle button no longer pastes.
TOGGLE_MODE = false

# Autoscroll over the desktop and panels too. Off by default: while the
# desktop or a panel/taskbar is focused (plasmashell, nemo-desktop,
# xfdesktop, waybar, xfce4-panel, org.gnome.shell, gjs) midscroll pauses,
# so a middle-drag there doesn't hijack the desktop. Set true to allow it.
DESKTOP_SCROLL = false

# Let the cursor move freely during a drag-scroll. Off by default: the cursor
# is anchored so the scroll stays on the window you started in. With this on
# the cursor follows the hand, but once it leaves the original window the
# scroll jumps to whatever is under it.
FREE_CURSOR = false

# Apps that use middle-drag themselves: while one of these is the focused
# window, midscroll pauses and the middle button behaves natively.
# Comma-separated, case-insensitive window-class substrings; leave empty
# to disable. (Needs the midscroll-overlay session service running.)
BLACKLIST = freecad, orcaslicer, minecraft
